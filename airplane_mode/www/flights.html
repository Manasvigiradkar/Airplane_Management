<h2 style="margin-bottom:30px;">List</h2>

{% for flight in flights %}
<div style="
    border: 1px solid #e4e6eb;
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 25px;
    background-color: #ffffff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
">

    <!-- AIRLINE NAME -->
    <h3 style="
        margin: 0;
        font-size: 22px;
        font-weight: 600;
        color: #1f2937;
    ">
        {{ flight.airplane }}
    </h3>

    <!-- ROUTE -->
    <p style="
        margin: 6px 0;
        font-size: 16px;
        font-weight: 500;
        color: #4b5563;
    ">
        {{ flight.source_airport_code }} → {{ flight.destination_airport_code }}
    </p>

    <!-- DATE TIME + DURATION -->
    <p style="
        margin: 8px 0 16px 0;
        font-size: 14px;
        color: #6b7280;
    ">
        {{ flight.date_of_departure }}
        |
        {{ flight.time_of_departure }}
        |
        {{ flight.duration_formatted }}
    </p>

    <!-- BUTTON -->
    <a href="/flight_detail?name={{ flight.name }}"
       style="
           color: #2563eb;
           font-weight: 500;
           text-decoration: none;
       ">
        View Flight
    </a>

</div>
{% endfor %}
